name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  bench:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run benchmarks and check for regressions
      run: |
        # Copy committed baselines into target/ so Criterion can compare against them.
        for bench_dir in benches/baselines/*/; do
          name=$(basename "$bench_dir")
          mkdir -p "target/criterion/$name/main"
          cp "$bench_dir/estimates.json" "target/criterion/$name/main/estimates.json"
        done

        # Run all Criterion [[bench]] targets.  Pass --load-baseline main so
        # Criterion prints regression warnings; pipe to tee for the artifact.
        cargo bench \
          -p forgottenserver-common --bench crypto \
          -p forgottenserver-items  --bench registry \
          -p forgottenserver-map    --bench spatial \
          -p forgottenserver-entity --bench conditions \
          -p forgottenserver-game   --bench combat \
          -p forgottenserver-network --bench codec \
          -- --load-baseline main 2>&1 | tee bench-output.txt

    - name: Fail on regression (PRs only)
      if: github.event_name == 'pull_request'
      run: |
        if grep -q "Performance has regressed" bench-output.txt; then
          echo "::error::Benchmark regression detected — see bench-output.txt artifact"
          exit 1
        fi

    - name: Update baselines (main branch only)
      if: github.ref == 'refs/heads/main'
      run: |
        cargo bench \
          -p forgottenserver-common --bench crypto \
          -p forgottenserver-items  --bench registry \
          -p forgottenserver-map    --bench spatial \
          -p forgottenserver-entity --bench conditions \
          -p forgottenserver-game   --bench combat \
          -p forgottenserver-network --bench codec \
          -- --save-baseline main

        # Copy updated baselines back to benches/baselines/ for commit.
        for bench_dir in target/criterion/*/main; do
          name=$(basename "$(dirname "$bench_dir")")
          mkdir -p "benches/baselines/$name"
          cp "$bench_dir/estimates.json" "benches/baselines/$name/estimates.json"
        done

        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add benches/baselines/
        git diff --cached --quiet || git commit -m "chore(bench): update baselines [skip ci]"
        git push

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: bench-results
        path: |
          bench-output.txt
          target/criterion/
        retention-days: 30
