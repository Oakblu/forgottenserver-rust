name: forgottenserver-perf

# Performance comparison stack: C++ upstream + Rust port sharing one MariaDB.
# C++ uses tibia_cpp database; Rust uses tibia_rs database (both created by
# the standard mariadb-init script).
#
# Start:   docker compose -f docker-compose.perf.yml up --build -d
# Stop:    docker compose -f docker-compose.perf.yml down
# Bench:   bash scripts/bench-status.sh

services:
  perf-db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root_secret
      MARIADB_USER: forgottenserver
      MARIADB_PASSWORD: forgottenserver
      MARIADB_DATABASE: forgottenserver
    volumes:
      - ./schema.sql:/opt/tfs-schema.sql:ro
      - ./docker/mariadb-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 12

  forgottenserver-cpp:
    build:
      context: ./forgottenserver-upstream
      dockerfile: Dockerfile
    ports:
      - "7371:7171"   # status port  (matches smoke.sh CPP_STATUS_PORT)
      - "7372:7172"   # game port    (perf-bot --target cpp)
    volumes:
      - ./docker/config-cpp-perf.lua:/srv/config.lua:ro
    depends_on:
      perf-db:
        condition: service_healthy

  forgottenserver-rust:
    build: .
    ports:
      - "7471:7171"   # status port  (matches smoke.sh RUST_STATUS_PORT)
      - "7472:7172"   # game port    (perf-bot --target rust)
    volumes:
      - ./docker/config-rust-perf.lua:/srv/config.lua:ro
    depends_on:
      perf-db:
        condition: service_healthy

volumes:
  perf-db-data:
