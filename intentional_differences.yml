  - id: shop-info-renamed-to-shop-item
    cpp_symbol: "ShopInfo, ShopInfo::ShopInfo"
    cpp_file: "src/enums.h"
    rust_symbol: "entity::npc::ShopItem"
    rust_module: "crates/entity/src/npc.rs"
    divergence: |
      C++ `ShopInfo { itemId, subType, buyPrice, sellPrice, realName }` is
      renamed to Rust `ShopItem { item_id, sub_type, buy_price, sell_price,
      name, weight }`. Minor type differences: prices are u32 (vs C++ i64)
      and weight (f64) is added to avoid a round-trip to the items table on
      every shop packet.
    reason: |
      ShopItem is more descriptive than ShopInfo in the Rust type system.
      Unsigned price fields match actual domain (prices are non-negative).
      Adding `weight` avoids an extra item-table lookup when the network
      packet is built.
    observable_equivalence: |
      test:entity::npc::tests::test_shop_item_new_fields (crates/entity/src/npc.rs:667)
      test:entity::npc::tests::test_shop_item_zero_prices (crates/entity/src/npc.rs:677)
      Wire bytes produced by the shop packet builder match C++ output since
      item_id, sub_type, buy_price, sell_price and name all map to the same
      network fields.
