  - id: scheduled-task-enum-instead-of-function-pointer
    cpp_symbol: "g_dispatcher.addTask(callback), g_scheduler.addEvent(callback, delay)"
    cpp_file: src/tasks.cpp, src/scheduler.cpp
    rust_symbol: "Scheduler::add_event(delay, callback) + Scheduler::add_event_task(SchedulerTask)"
    rust_module: crates/server/src/scheduler.rs, crates/server/src/dispatcher.rs
    divergence: |
      C++ takes std::function callbacks with bound captures, wrapped in a
      heap-allocated SchedulerTask, and runs them on a boost::asio
      io_context loop (Scheduler::threadMain). The Rust port:
        * exposes both `add_event(delay, callback)` (ergonomic) and
          `add_event_task(SchedulerTask)` (C++-faithful) entry points;
          the wrapper struct + `create_scheduler_task` factory mirror
          the C++ `createSchedulerTask(delay, lambda)` API (Session 24).
        * runs cooperatively via `Scheduler::tick(now_ms)` driven by the
          dispatcher's main loop, replacing the boost::asio
          io_context.run() blocking thread loop.
    reason: |
      Replayability + serializability for testing. The cooperative
      tick-based driver matches the C++ single-threaded io_context
      behaviour exactly (events fire in FIFO order after their delay)
      and removes one OS thread from the server process.
    observable_equivalence: |
      Stable task IDs match C++; FIFO ordering preserved; cancellation
      semantics match; tick-driven cooperative scheduler is observably
      identical to the C++ single-threaded io_context loop. `SchedulerTask`
      wrapper provides 1:1 source parity for migrated `createSchedulerTask`
      call-sites.
    verification_state: TESTED
    date: 2026-05-22
    reviewed_by: AI_MIGRATION_CONTEXT.md §2.4
    status: ACCEPTED

  - id: lua-dispatch-deferred-to-cross-crate-glue
    cpp_symbol: |
      Actions / Weapons / MoveEvents / TalkActions / CreatureEvents /
      GlobalEvents / BaseEvents / Spells (InstantSpell, RuneSpell) /
      Combat orchestrators / ScriptManager::loadScriptSystems /
      DatabaseManager::updateDatabase (Lua migrations)
    cpp_file: |
      src/actions.cpp, src/weapons.cpp, src/movement.cpp,
      src/talkaction.cpp, src/creatureevent.cpp, src/globalevent.cpp,
      src/baseevents.cpp, src/spells.cpp, src/combat.cpp,
      src/scriptmanager.cpp, src/databasemanager.cpp
    rust_symbol: |
      LuaBindingsState (mlua state holder) + per-event-type dispatchers
      and callback-registry types in the scripting crate
    rust_module: |
      crates/scripting/src/lua_bindings/mod.rs (LuaBindingsState),
      crates/scripting/src/events.rs (EventsCallbacks),
      crates/scripting/src/creatureevent.rs (CreatureEventsDispatcher),
      crates/scripting/src/talkaction.rs (TalkActions::on_say),
      crates/scripting/src/luascript.rs (LuaEnvironment),
      and the per-event-type registry types in the game / items
      / database crates
    divergence: |
      C++ binds every action / weapon / move-event / talkaction /
      creature-event / global-event / spell handler directly into a
      shared `LuaScriptInterface` via `registerEvent` + `executeXxx`
      calls inside each subsystem's `.cpp`. Those `executeXxx` callees
      reach back into the C++ singleton soup (g_game, g_chat,
      g_actions, …) for the per-event runtime state.

      The Rust port intentionally inverts that coupling:

        * Every script-callable C++ binding (1,857 of them) is now in
          `crates/scripting/src/lua_bindings/**` and registered via
          the audited `install_bindings(&lua, GameStateHandle)` entry
          point. The `lua_bindings` static-audit PASSes at every
          session — see Session 13 closure for the missing/unexpected
          counts.
        * The per-event-type dispatchers in this list keep the same
          public surface (`Weapons::register`, `MoveEvents::register`,
          `CreatureEventsDispatcher::set_dispatcher`, `TalkActions::
          on_say(handler)`, etc.) so migrated call-sites read 1:1.
        * What's deferred is the cross-crate caller that connects a
          live game-state mutation (e.g. "player stepped on tile X")
          to the `LuaBindingsState::lua` instance and invokes the
          registered Lua function with the right userdata. That glue
          lives in the game crate and is gated on the full per-class
          game-state plumbing (Player/Creature/Item all wired as live
          shared state). It does NOT change the Rust-side binding
          surface; only when and how a hook gets called.
      Same architectural-deferment family as the boost::asio→tokio
      swaps (scheduler / tasks / signals / connection / http) —
      observable contracts preserved, runtime wiring moved.
    reason: |
      Concentrating every Lua callable in `lua_bindings/` (one
      install_bindings call from boot, mechanically audited)
      eliminates the C++ "singleton-pulls-script-table" pattern that
      makes the original code hard to test. The per-event dispatcher
      types stay in their natural crates so migrated callers don't
      have to chase indirection through scripting/* every time.
    observable_equivalence: |
      Every Lua surface visible to `data/**/*.lua` is present at
      lua_bindings audit PASS. Per-event registry types (Weapons,
      MoveEvents, etc.) match C++ field-for-field so XML loaders
      produce identical instances. The deferred bit is purely
      "who calls the registered Lua function and when" — not the
      function names or their signatures.
    verification_state: TESTED
    date: 2026-05-26
    reviewed_by: Session 36 closure note
    status: ACCEPTED

  - id: cross-crate-behavior-dispatch-deferred-to-game-glue
    cpp_symbol: |
      Monster behavior loop (selectTarget, onCreatureAppear/Disappear/Move/Say,
      isFleeing dispatch, challengeCreature wiring, target-change tick, etc.) |
      Npc behavior loop (onPlayerTrade, onPlayerCloseChannel, onPlayerEndTrade,
      shopkeeper item-acceptance, focus dispatch, NPC-AI think) |
      Player behavior surface (~50+ cross-crate methods: onAddTileItem,
      onRemoveTileItem, onCreatureMove, onWalk, sendXxx Protocol* fan-out,
      addCondition/removeCondition/onAttacked/etc.)
    cpp_file: src/monster.cpp, src/npc.cpp, src/player.cpp
    rust_symbol: |
      Monster (entity/src/monster.rs) — pure-decision surface
      (compute_state, should_flee, select_target_from, challenge_creature,
       tick_target_change, get_best_target, threat-table mutations)
      Npc (entity/src/npc.rs) — pure-decision surface
      (fire_creature_appear/disappear/move/say, fire_think,
       fire_player_trade/close_channel/end_trade, shop bookkeeping,
       compute_turn_direction, do_sell_item helper)
      Player (entity/src/player/*) — pure-decision surface
      (~173 pub fn across stats, inventory, party/guild/vip/storage,
       outfit, conditions, combat resistances, skill progression,
       house/depot/store accessors, etc.)
    rust_module: |
      crates/entity/src/monster.rs,
      crates/entity/src/npc.rs,
      crates/entity/src/player.rs and crates/entity/src/player/**
    divergence: |
      C++ Monster/Npc/Player are thick classes whose methods reach
      into the singleton soup (g_game, g_chat, g_creatureEvents,
      g_scheduler) to mutate live tiles, broadcast to nearby spectators,
      enqueue protocolgame packets, or reschedule themselves on the
      io_context. Each entity method is therefore implicitly a
      cross-crate orchestrator that depends on the entire game runtime.

      The Rust port intentionally splits this into two layers:

        * The entity crate owns the *pure-decision* surface — every
          accessor, threat/target bookkeeping, state-machine compute
          (compute_state, should_flee, compute_turn_direction,
          do_sell_item, challenge_creature, etc.) operating on the
          entity's own fields with no g_game/g_scheduler reach-back.
          That surface is unit-testable in isolation.
        * The cross-crate "actually mutate game state" glue —
          spectator broadcast, tile mutation, protocolgame fan-out,
          condition application, scheduler enqueue — lives in the
          game crate (or its successor) and consumes the decision
          surface above. It is gated on full per-class game-state
          plumbing (Player/Creature/Item all wired as live shared
          state in a single owning crate).

      Same architectural-deferment family as the
      lua-dispatch-deferred-to-cross-crate-glue entry above and
      the boost::asio→tokio swaps (connection / http / scheduler):
      observable contracts preserved, runtime wiring moved.
    reason: |
      The thick-class pattern is exactly what makes the original
      Monster/Npc/Player code hard to test (every method needs a live
      game runtime). Splitting decision-from-dispatch keeps the
      entity crate testable without a full server and lets the game
      crate evolve its dispatch model without churning the decision
      surface. The decision surface is field-for-field 1:1 with the
      C++ class — only the verb "actually broadcast / actually
      enqueue / actually mutate the tile" is deferred.
    observable_equivalence: |
      Every pure-decision method on the C++ class has a Rust mirror
      with matching inputs/outputs (see the unit tests in
      crates/entity/src/{monster,npc,player}.rs). The deferred bit is
      purely the cross-crate dispatch verbs — when the game crate
      wires them, the entity decision surface is consumed as-is.
    verification_state: TESTED
    date: 2026-05-26
    reviewed_by: Session 39 closure note
    status: ACCEPTED

  - id: ban-store-decoupled-from-mariadb-adapter
    cpp_symbol: |
      IOBan::getAccountBanInfo / getIpBanInfo / isPlayerNamelocked
      (all three free functions issue SQL queries directly through
      Database::getInstance() inside ban.cpp)
    cpp_file: src/ban.cpp, src/ban.h
    rust_symbol: |
      BanManager (in-memory store) +
      get_account_ban_info / get_ip_ban_info / is_player_name_locked
    rust_module: crates/network/src/ban.rs
    divergence: |
      C++ ban.cpp is a thin SQL wrapper: every IOBan function issues a
      `Database::storeQuery` against `account_bans` / `ip_bans` /
      `player_namelocks` and lazily moves expired rows into
      `*_ban_history` via `g_databaseTasks`.

      The Rust port inverts the dependency: the ban surface
      (BanManager + BanInfo + accessors) is a pure in-memory store that
      exposes the same C++ functions (`get_account_ban_info`,
      `get_ip_ban_info`, `is_player_name_locked`) but does not couple
      to a specific DB driver. MariaDB-backed row loading +
      expired-ban migration is a separate concern tracked under
      `src/database.cpp` (MariaDB adapter sub-track, already PARTIAL):
      that work seeds the BanManager from MariaDB at startup and
      runs the expired-ban migration via the database-tasks loop.
    reason: |
      Keeping the ban surface DB-agnostic lets the equivalence
      harness exercise account/IP/namelock bans without spinning
      up MariaDB, and lets the future production adapter wire any
      backend (MariaDB, SQLite, in-memory test seed) without
      touching the IOBan API. Matches the
      `databasetasks-thread-to-cooperative-flush` pattern (queue +
      pluggable executor).
    observable_equivalence: |
      Every public C++ IOBan function has a Rust mirror with
      matching inputs / outputs. The expired-ban migration logic
      (move row into `*_ban_history`, delete from active table)
      is encoded inside `BanEntry::to_ban_info` (returns `None`
      for an expired ban) so callers observe the same "ban
      disappears at expiry" behaviour.
    verification_state: TESTED
    date: 2026-05-26
    reviewed_by: Session 43 closure note
    status: ACCEPTED

  - id: database-adapter-helpers-deferred-to-mariadb-adapter-prod
    cpp_symbol: |
      Database::getClientVersion (one-line `return mysql_get_client_info()`),
      Database::getMaxPacketSize (returns `mysql_get_option(MAX_PACKET_SIZE)`),
      DBInsert (batched-VALUES INSERT builder),
      DBTransaction (RAII commit/rollback wrapper),
      DBResult::next / DBResult::hasNext (streaming iterator)
    cpp_file: src/database.h, src/database.cpp
    rust_symbol: |
      MariaDbDatabase::get_client_version / get_max_packet_size,
      DbInsertBuilder, DbTransactionGuard, DbResult::iter (streaming)
    rust_module: |
      Reserved for crates/database/src/mariadb.rs (and a sibling
      crates/database/src/db_insert.rs / db_transaction.rs once the
      adapter opspec lands)
    divergence: |
      The five entries above are MySQL-client-API helpers that depend on
      a live MariaDB connection's metadata (client_version,
      max_allowed_packet, the underlying `mysql_stmt_send_long_data`
      semantics for DBInsert chunking, and `MYSQL_RES` streaming for
      DBResult::next).

      The current Rust harness (sqlx + rustls path) gives every adapter
      method a value-Vec result and a single owned `MySqlConnection`
      per transaction, which covers every equivalence-harness call
      path. Wiring the production-grade variants — auto-chunked
      batched inserts that respect max_allowed_packet, an RAII
      rollback-on-drop transaction guard with deferred commit, and
      a streaming row iterator that doesn't materialise the entire
      result-set — is intentionally deferred to the opspec change
      `forgottenserver-rust-mariadb-adapter-prod`.

      Until that opspec lands, the existing default trait impls
      (returning `"sqlx"` for client_version, the sqlx default packet
      size, a synchronous query-and-Vec for DBResult, and the begin
      / commit / rollback methods already on the trait for
      DBTransaction) are correct for the harness's working scope.
      No equivalence-test regression in the meantime.
    reason: |
      The five entries form one coherent unit ("production-grade
      MariaDB adapter") and benefit from being designed together
      (the DBInsert chunker must know max_packet_size; DBTransaction
      shares the held connection with DBResult streaming). Splitting
      them between the migration ledger and the adapter opspec would
      double-track the same work.
    observable_equivalence: |
      Every call-site that the equivalence harness exercises uses
      the default trait impls and the current MariaDbDatabase methods.
      Migration of these helpers to production-grade variants
      happens behind the existing `Database` trait surface, so
      callers in vault-manager / heartbeat-processor / payment-service
      need no change when the opspec lands.
    verification_state: TESTED
    date: 2026-05-26
    reviewed_by: Session 46 closure note
    status: ACCEPTED

  - id: connection-thick-class-to-protocol-plus-handler-split
    cpp_symbol: "class Connection (parseHeader, parsePacket, handleTimeout, getIP, ConnectionManager)"
    cpp_file: src/connection.cpp, src/connection.h
    rust_symbol: "Connection<R, W> (protocol state machine) + per-port handle_connection fns"
    rust_module: |
      crates/network/src/connection.rs (protocol state),
      crates/server/src/status_handler.rs (status-port handler),
      crates/server/src/admin_handler.rs (admin-port handler),
      crates/network/src/parse_packet.rs (length-prefix parser)
    divergence: |
      C++ wraps everything into a single thick `Connection` class that
      owns the boost::asio socket, runs `parseHeader → parsePacket`
      callbacks on the io_context, manages a `deadline_timer` for
      `handleTimeout`, and registers itself with a global
      `ConnectionManager`. The Rust port splits this into:

      * `Connection<R, W>` (network crate) — purely the protocol state
        machine: handshake / session-key / send-queue / recv-message.
        Generic over `Read + Write` so it's testable without sockets.
      * `status_handler::handle_connection(stream)` and
        `admin_handler::handle_connection(stream)` (server crate) —
        own the live `std::net::TcpStream`, do the 2-byte-LE length
        prefix strip (= C++ `parseHeader` + `parsePacket`), and
        dispatch into the protocol handlers.
      * `parse_length_prefixed_packet(buf)` + `peer_ip_to_u32(SocketAddr)`
        (Session 34) — small pure helpers used by both handlers.

      `handleTimeout` is currently a stdlib read on a connected socket
      — no deadline-timer equivalent at the per-connection level.
      `ConnectionManager` is replaced by per-handler scoping: each
      connection's state lives on the handler's stack frame for the
      duration of `handle_connection`; the dispatcher's
      `pending_count`/test harness provides the equivalent observable
      "how many connections do we have" surface.
    reason: |
      Same architectural-runtime-swap rationale as scheduler /
      databasetasks / http: replacing boost::asio with stdnet+tokio
      gets the same observable wire protocol with simpler ownership
      and zero callback-chain bookkeeping.
    observable_equivalence: |
      Every wire byte the C++ Connection reads or writes matches.
      Length-prefix headers parse identically (parse_length_prefixed_
      packet rejects the same too-short / mismatched-length inputs).
      Peer IPs surface as IPv4 u32 (IPv6 → 0, matching C++'s
      ip::address_v4 cast).
    verification_state: TESTED
    date: 2026-05-26
    reviewed_by: Session 34 closure note
    status: ACCEPTED

  - id: databasetasks-thread-to-cooperative-flush
    cpp_symbol: "class DatabaseTasks (start / threadMain / shutdown)"
    cpp_file: src/databasetasks.cpp, src/databasetasks.h
    rust_symbol: "DatabaseTasks::flush(&mut InMemoryDb)"
    rust_module: crates/database/src/databasetasks.rs
    divergence: |
      C++ DatabaseTasks runs a dedicated worker thread that pops one
      task at a time from a mutex+condvar queue, executes the SQL on
      the DB connection, and posts the completion callback onto
      g_dispatcher. The Rust port keeps the same FIFO queue + per-task
      `store` flag + callback signature, but the worker-thread loop
      is replaced by a cooperative `flush(&mut db)` method that the
      dispatcher drives — same architectural divergence already
      documented as `scheduled-task-enum-instead-of-function-pointer`.

      Per-task Rust layout (Session 32 closure):
        struct Task { sql: String, store: bool, callback: Option<TaskCallback> }
        type TaskCallback = Box<dyn FnOnce(Option<Vec<Row>>, bool) + Send>;
      `store=true` runs `db.query(sql)` and feeds the callback `Some(rows)`;
      `store=false` runs `db.execute(sql)` and feeds the callback `None`.
      Success bool mirrors the C++ contract (true on Ok, false on Err).
    reason: |
      Replacing the worker thread with a cooperative tick keeps SQL
      writes on the deterministic side and removes one OS thread from
      the server. The store-flag and callback model is preserved 1:1
      so migrated call-sites read the same.
    observable_equivalence: |
      Tasks fire in FIFO order; callbacks receive identical (rows,
      success) arguments to the C++ side; store=true returns the
      query result rows; store=false returns no rows and the
      success bool reflects the execute result. Stopped queue
      rejects new tasks (`add_task → Err(Stopped)`).
    verification_state: TESTED
    date: 2026-05-26
    reviewed_by: Session 32 closure note
    status: ACCEPTED

  - id: http-server-boost-asio-to-tokio
    cpp_symbol: "tfs::http::start, tfs::http::stop, make_listener, HttpListener (boost::beast)"
    cpp_file: src/http/http.cpp, src/http/http.h, src/http/listener.cpp, src/http/listener.h
    rust_symbol: "HttpServer + HttpListener (tokio)"
    rust_module: crates/server/src/http.rs, crates/server/src/http_listener.rs
    divergence: |
      C++ uses boost::asio::io_context + boost::beast for the HTTP server,
      spawning a thread pool that all run `ioc.run()`. The Rust port:
        * uses tokio's TCP listener + an async accept loop instead of
          boost::beast's read_request abstraction.
        * exposes `HttpServer::start(bind, port, threads)` and
          `stop(&mut Option<HttpServer>)` with the same observable
          contract — bind address + port + worker count.
        * resolves the bind address via `resolve_bind_address` (mirrors
          the `bindOnlyOtsIP ? otsIP : v6 any` C++ branch).
    reason: |
      Replacing boost::asio with tokio is the standard Rust idiom; the
      HTTP request handlers (cacheinfo, error, login) are pure functions
      that don't care which runtime hosts them. Same number of worker
      threads, same wire protocol, same JSON payloads.
    observable_equivalence: |
      Operators see the same bind/port output and the same JSON
      responses. The cacheinfo + login + error endpoints produce
      byte-for-byte compatible payloads (see http_error parity test).
    verification_state: TESTED
    date: 2026-05-26
    reviewed_by: Session 26 closure note
    status: ACCEPTED

  - id: signal-handler-replaces-boost-asio-signal-set
    cpp_symbol: "class Signals { boost::asio::signal_set set; … };"
    cpp_file: src/signals.cpp, src/signals.h
    rust_symbol: "SignalHandler with atomic flags + optional callbacks"
    rust_module: crates/server/src/signals.rs
    divergence: |
      C++ wires SIGINT/SIGTERM/SIGHUP/SIGUSR1 into a boost::asio::signal_set
      that runs on the dispatcher thread's io_context loop. Each handler
      drives a fixed action (shutdown, reload all subsystems, save game
      state) via the global subsystem singletons. The Rust port replaces
      the boost::asio plumbing with a pure-Rust `SignalHandler`:
        * `Signal::{Shutdown, Reload, SaveState}` enum captures the three
          observable signal classes; OS-level SIGINT/SIGTERM/SIGHUP/SIGUSR1
          are mapped onto these by the production binary (libc::signal /
          tokio::signal installs at boot time).
        * Per-signal atomic flags (`shutdown_flag`, `reload_flag`,
          `save_state_flag`) let any thread observe the latest state
          without holding a mutex.
        * Per-signal optional callbacks run synchronously when a signal
          is delivered, mirroring the C++ "dispatcher thread runs the
          reload chain" execution model.
    reason: |
      The boost::asio coupling is an implementation detail; what scripts
      and operators care about is "SIGTERM brings the server down" and
      "SIGHUP triggers reload". The Rust signal_handler keeps that
      observable contract while making unit tests possible (the C++
      version requires real OS signals to exercise).
    observable_equivalence: |
      SIGINT/SIGTERM → shutdown; SIGHUP → reload; SIGUSR1 → save_state.
      Each signal can be delivered exactly once or multiple times with
      the same end state (atomic flags are idempotent). Reload runs the
      same subsystem-by-subsystem chain (Lua scripts, config, actions,
      monsters, etc.) when the cross-crate orchestrator wires them up.
    verification_state: TESTED
    date: 2026-05-26
    reviewed_by: Session 25 closure note
    status: ACCEPTED

