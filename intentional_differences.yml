differences:
  - id: handles-instead-of-raw-pointers
    cpp_symbol: "Creature*, Player*, Item*, Tile*"
    cpp_file: "(workspace-wide)"
    rust_symbol: "CreatureId(u32), PlayerId(u32), ItemId, Position-based Tile lookup"
    rust_module: "(workspace-wide; see common::handles)"
    divergence: |
      C++ stores raw / shared / weak pointers to game objects.
      Rust uses opaque ID handles that resolve via registries.
    reason: |
      Rust's ownership model forbids long-lived raw pointers without unsafe.
      Handles + registry preserves observable behavior: a freed entity yields
      None on lookup (matching std::weak_ptr semantics). All entity lifecycle
      observable at protocol + Lua binding + persisted state layers is
      preserved.
    observable_equivalence: |
      Wire bytes for entity references match (CreatureId encoded as u32 in
      protocolgame); Lua bindings resolve handles to userdata transparently
      (LuaPlayer { id: PlayerId } pattern in scripting/lua_api.rs);
      registries enforce single-source-of-truth that C++ achieved via
      shared_ptr ownership.
    verification_state: HARNESS_PENDING
    date: 2026-05-22
    reviewed_by: AI_MIGRATION_CONTEXT.md §2.2
    status: ACCEPTED

  - id: cylinder-trait-object-dispatch
    cpp_symbol: "class Cylinder (virtual queryAdd/queryMaxCount/queryRemove/postAdd/postRemove)"
    cpp_file: src/cylinder.h
    rust_symbol: "trait Cylinder + &dyn Cylinder dispatch"
    rust_module: crates/common/src/cylinder.rs
    divergence: |
      C++ uses class hierarchy with virtual cylinder methods.
      Rust uses a Cylinder trait + trait-object dispatch on &dyn Cylinder.
    reason: |
      Option 2 chosen per MIGRATION_DELTA.md "Phase 0 Decisions":
      30+ callers reference Creature; relocating types across crates to
      avoid trait-object indirection would invalidate the documented
      layering in DEPENDENCY_GRAPH.md. Trait dispatch is the canonical
      Rust equivalent of virtual methods; the vtable cost is negligible.
    observable_equivalence: |
      Same enum return values (ReturnValue); same side-effect ordering
      (queryAdd → addThing → postAddNotification → spectator broadcast).
      Per-impl cylinder_query_add suites in tile.rs / container.rs /
      inbox.rs / storeinbox.rs / depotchest.rs / depotlocker.rs verify
      parity with C++ behavior tables.
    verification_state: TESTED
    date: 2026-05-24
    reviewed_by: MIGRATION_DELTA.md §"Phase 0 Decisions"
    status: ACCEPTED

