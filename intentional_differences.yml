# ═════════════════════════════════════════════════════════════════════════
# Phase 3 — Layer 2 divergences (groups.h/cpp, outfit.h/cpp)
# ═════════════════════════════════════════════════════════════════════════

  - id: outfits-singleton-removed
    cpp_symbol: "static Outfits& Outfits::getInstance()"
    cpp_file: "src/outfit.h"
    rust_symbol: "(none — Outfits is constructed as an owned value)"
    rust_module: "crates/items/src/outfit.rs"
    divergence: |
      C++ `Outfits` exposes a `static Outfits& getInstance()` Meyer's-singleton
      accessor so callers can reach the global outfit registry without a
      dependency injection mechanism. The Rust port constructs `Outfits` as
      an ordinary owned value (via `Outfits::load_from_xml`) and passes it
      to the subsystems that need it, eliminating the global mutable singleton.
    reason: |
      Rust's ownership model makes global mutable singletons unsafe and
      ergonomically hostile. `Outfits` is a read-only registry after
      construction; passing it as an owned or borrowed value is both safer
      and more testable than a hidden global. The server boot sequence
      already follows this pattern for all other registries (Items, Groups).
    observable_equivalence: |
      Callers that previously called `Outfits::getInstance().getOutfitByLookType(...)`
      now receive an `&Outfits` reference from the boot context. The lookup
      behaviour is identical: same XML source, same per-sex vectors, same
      linear scan returning the first match.
      Test: items::outfit::tests (crates/items/src/outfit.rs) — exercises
      load_from_xml, get_outfit_by_look_type, find_outfit_by_look_type, and
      get_outfits for both sexes.
    verification_state: TESTED
    date: 2026-05-27
    reviewed_by: forgottenserver-rust-final-migration Phase 3
    status: ACCEPTED

  - id: groups-load-from-file-to-xml-string
    cpp_symbol: "bool Groups::load()"
    cpp_file: "src/groups.h"
    rust_symbol: "items::groups::Groups::load_from_xml(xml: &str) -> Result<Self, String>"
    rust_module: "crates/items/src/groups.rs"
    divergence: |
      C++ `Groups::load()` opens `data/XML/groups.xml` directly using
      pugixml, returning `false` on any error. The Rust port exposes
      `Groups::load_from_xml(xml: &str)` which parses an XML string
      provided by the caller, returning `Result<Self, String>`.
      File I/O is the responsibility of the boot sequence, not the type.
    reason: |
      Rust's error handling model (Result vs bool+out-param) and testability
      requirements drive the signature change. Separating file I/O from
      parsing allows unit tests to verify parsing behaviour without touching
      the filesystem. The boot sequence supplies the XML content via
      `std::fs::read_to_string`. This matches the same pattern applied to
      Outfits::loadFromXml and Items::loadFromXml.
    observable_equivalence: |
      The XML parsing logic, including all flag names, numeric flags merging,
      and per-group field extraction, is fully equivalent to C++.
      Tests: items::groups::tests (crates/items/src/groups.rs) — 40+ tests
      verify all fields, flag combinations, error cases, and the full
      gamemaster group from the real groups.xml.
    verification_state: TESTED
    date: 2026-05-27
    reviewed_by: forgottenserver-rust-final-migration Phase 3
    status: ACCEPTED

  - id: parse-player-flag-map-to-match-function
    cpp_symbol: "const std::unordered_map<std::string, PlayerFlags> ParsePlayerFlagMap"
    cpp_file: "src/groups.cpp"
    rust_symbol: "fn flag_name_to_bit(name: &str) -> Option<u64>"
    rust_module: "crates/items/src/groups.rs"
    divergence: |
      C++ uses a `const std::unordered_map<std::string, PlayerFlags>` constant
      `ParsePlayerFlagMap` to map flag-name strings to `PlayerFlags` enum values
      at runtime. The Rust port replaces this with a private `fn flag_name_to_bit`
      that uses a `match` expression, which the compiler compiles to an equivalent
      (or faster) dispatch table.
    reason: |
      A Rust `match` on `&str` is zero-allocation, avoids heap-allocated
      `HashMap` construction at startup, and is directly verifiable by the
      compiler. The function is private to the module, matching the C++ constant's
      file-scope (non-exported) visibility.
    observable_equivalence: |
      All 39 flag-name → bit-value mappings are present and tested.
      Test: items::groups::tests::test_flag_name_to_bit_all_known_keys
      (crates/items/src/groups.rs) verifies every entry from the C++
      ParsePlayerFlagMap maps to the correct PlayerFlags constant.
    verification_state: TESTED
    date: 2026-05-27
    reviewed_by: forgottenserver-rust-final-migration Phase 3
    status: ACCEPTED

  - id: outfit-struct-renamed-to-outfit-definition
    cpp_symbol: "struct Outfit"
    cpp_file: "src/outfit.h"
    rust_symbol: "items::outfit::OutfitDefinition"
    rust_module: "crates/items/src/outfit.rs"
    divergence: |
      C++ uses the name `Outfit` for the outfit-definition struct (the registry
      entry loaded from XML with name, lookType, premium, unlocked fields).
      Rust renames it to `OutfitDefinition` to distinguish it from the
      appearance/state struct `common::enums::Outfit` (the creature's current
      look with lookType, lookTypeEx, lookHead, etc.).
    reason: |
      Two structs named `Outfit` in the same workspace would be ambiguous.
      `OutfitDefinition` follows Rust naming conventions (descriptive suffix)
      and is unambiguous alongside `common::enums::Outfit`.
    observable_equivalence: |
      All fields (name, look_type, premium, unlocked) are present and map
      1-to-1. The C++ `operator==` is replaced by `#[derive(PartialEq)]`.
      Tests: items::outfit::tests (crates/items/src/outfit.rs) — exercises
      all fields and equality semantics.
    verification_state: TESTED
    date: 2026-05-27
    reviewed_by: forgottenserver-rust-final-migration Phase 3
    status: ACCEPTED

  - id: cylinder-class-to-trait
    cpp_symbol: "Cylinder"
    cpp_file: "src/cylinder.h"
    rust_symbol: "common::cylinder::Cylinder"
    rust_module: "crates/common/src/cylinder.rs"
    divergence: |
      The C++ `Cylinder` base class has been deleted upstream (afd91657) and
      its methods merged into `Thing`. Rust never used a `Cylinder` base class;
      the receiver contract is expressed as the `common::Cylinder` trait to
      enable trait-object dispatch across crate boundaries without pulling in
      concrete types from higher crates.
    reason: |
      Rust's ownership model and crate dependency graph make a concrete base
      class impossible here. A trait in `common` lets `map::Tile`,
      `items::Container`, and other types implement the contract without
      circular dependencies.
    observable_equivalence: |
      All receiver methods (`cylinder_query_add`, `cylinder_post_add`, etc.)
      are present on implementors. Behaviour at the protocol and Lua layers is
      identical. Tests: `common::cylinder::tests`
      (crates/common/src/cylinder.rs).
    verification_state: TESTED
    date: 2026-05-28
    reviewed_by: upstream-sync-2026-05-28
    status: ACCEPTED

  - id: creature-speech-bubble-npc-only
    cpp_symbol: "Creature::getSpeechBubble"
    cpp_file: "src/creature.h"
    rust_symbol: "entity::npc::Npc::get_speech_bubble"
    rust_module: "crates/entity/src/npc.rs"
    divergence: |
      C++ had `virtual uint8_t getSpeechBubble() const` on the `Creature` base
      returning `SPEECHBUBBLE_NONE`. Upstream removed it in 335e4da6
      (2025-12-03), restricting speech bubbles to NPCs. Rust never had this on
      a `Creature` trait — `get_speech_bubble()` is NPC-only from the start.
    reason: |
      Rust's static dispatch means a default-returning virtual method on
      Creature adds no value and creates false expectations. NPC-only placement
      matches actual usage.
    observable_equivalence: |
      Non-NPC creatures never had a non-None speech bubble; the Lua binding
      `getSpeechBubble` on the NPC userdata returns the correct value. Tests:
      `entity::npc::tests::test_npc_speech_bubble_none_by_default` and
      `test_npc_set_speech_bubble`.
    verification_state: TESTED
    date: 2026-05-28
    reviewed_by: upstream-sync-2026-05-28
    status: ACCEPTED

