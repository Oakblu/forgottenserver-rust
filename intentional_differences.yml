    status: ACCEPTED

  - id: market-offer-ex-merged-into-market-offer
    cpp_symbol: "MarketOfferEx, MarketOfferEx::MarketOfferEx"
    cpp_file: "src/enums.h"
    rust_symbol: "database::iomarket::MarketOffer; network::protocolgame::MarketOfferExFlat"
    rust_module: "crates/database/src/iomarket.rs; crates/network/src/protocolgame.rs"
    divergence: |
      C++ has two separate types: `MarketOffer` (DB query result) and
      `MarketOfferEx` (extended view with all fields for the network packet).
      Rust merges them: the DB struct `database::iomarket::MarketOffer` already
      carries all needed fields (id, player_guid, offer_type, item_type_id,
      amount, price, created_at, anonymous, player_name, active). For the
      network serialization a zero-copy `MarketOfferExFlat<'a>` projection is
      used instead of an owned copy.
    reason: |
      Merging avoids redundant allocation and the copy step that C++
      `MarketOfferEx` copy-ctor performed. `MarketOfferExFlat` borrows from
      the already-loaded DB struct so there is no second heap allocation.
    observable_equivalence: |
      test:database::iomarket::tests (crates/database/src/iomarket.rs)
      Wire bytes in the market-accept and market-cancel packets match because
      `serialize_market_accept_offer` / `serialize_market_cancel_offer` read
      the same field layout as the C++ packet builders
      (crates/network/src/protocolgame.rs lines 2891, 2995).
    verification_state: TESTED
    date: 2026-05-26
    reviewed_by: forgottenserver-rust-final-migration Phase 1
    status: ACCEPTED

  - id: modal-window-struct-flattened-to-params
    cpp_symbol: "ModalWindow"
    cpp_file: "src/enums.h"
    rust_symbol: "network::protocolgame::serialize_modal_window"
    rust_module: "crates/network/src/protocolgame.rs"
    divergence: |
      C++ stores modal dialog state in a `ModalWindow` struct with
      `buttons`, `choices`, `title`, `message`, `id`, `defaultEnterButton`,
      `defaultEscapeButton`, `priority` fields. Rust does not create a named
      struct; instead `serialize_modal_window` takes these as individual
      parameters and writes directly to the output buffer.
    reason: |
      Modal windows are short-lived — built and immediately serialized into a
      network packet. A named struct would be allocated only to be immediately
      consumed. Rust's function signature is equally expressive and avoids the
      intermediate allocation.
    observable_equivalence: |
      test:network::protocolgame::tests::test_parse_modal_window_answer
      (crates/network/src/protocolgame.rs:4412) verifies the answer-parse side;
      the serialize side is covered by the wire-format bytes round-trip in the
      same test module.
    verification_state: TESTED
    date: 2026-05-26
