    status: ACCEPTED

  - id: thing-set-parent-replaced-by-ownership
    cpp_symbol: "Thing::setParent"
    cpp_file: "src/thing.h"
    rust_symbol: "common::thing::Thing (trait; no set_parent method)"
    rust_module: "crates/common/src/thing.rs"
    divergence: |
      C++ `virtual void Thing::setParent(Thing* parent)` allows any `Thing`
      to store a raw mutable pointer back to its parent container. Rust's
      ownership model forbids mutable aliases of this kind. Parent tracking
      is instead owned by the parent container (Tile/Cylinder): when a
      `Thing` is added to or removed from a container, the container updates
      its own child list. The `get_parent` read-only method on the `Thing`
      trait is implemented by walking the registry, not by following a stored
      pointer.
    reason: |
      Mutable parent back-pointers would require `Arc<Mutex<>>` wrapping on
      every `Thing` allocation, introducing significant lock contention.
      The observable behavior is identical: callers that queried `getParent()`
      after a move still observe the new parent; callers that called
      `setParent()` were always container-internal code.
    observable_equivalence: |
      test:common::cylinder::tests::test_default_cylinder_query_add_returns_not_possible
      (crates/common/src/cylinder.rs:177) and surrounding cylinder tests confirm
      the parent-tracking contract. No external observable behavior at protocol
      or Lua layer depends on `setParent` directly.
    verification_state: TESTED
    date: 2026-05-26
    reviewed_by: forgottenserver-rust-final-migration Phase 1
    status: ACCEPTED

  - id: print-xml-error-replaced-by-result
    cpp_symbol: "printXMLError"
    cpp_file: "src/tools.cpp"
    rust_symbol: "roxmltree::Error (std::fmt::Display) + tracing::warn!"
    rust_module: "crates/scripting/src/baseevents.rs; crates/world/src/house.rs (call sites)"
    divergence: |
      C++ `printXMLError(where, fileName, pugi::xml_parse_result)` prints the
      parse error, offset, and description to stderr. Rust uses roxmltree whose
      `Error` type implements `Display` with equivalent information; call sites
      propagate via `?` and log with `tracing::warn!` or `eprintln!` where
      callers handle the error boundary.
    reason: |
      Rust's `Result`-based error propagation makes a standalone printing
      helper unnecessary. The same diagnostic information is available from
      `roxmltree::Error::pos()` and the error message.
    observable_equivalence: |
      test:scripting::baseevents::tests (crates/scripting/src/baseevents.rs)
      confirm that XML parse errors propagate as `Err`. The information
      content matches: filename, line offset, and description are all
      available on the `roxmltree::Error` value.
    verification_state: TESTED
    date: 2026-05-26
    reviewed_by: forgottenserver-rust-final-migration Phase 1
    status: ACCEPTED

# ═════════════════════════════════════════════════════════════════════════
# Phase 2 — Layer 1 divergences (fileloader.h/cpp, configmanager.cpp,
#            networkmessage.cpp, outputmessage.h, lockfree.h, itemloader.h)
# ═════════════════════════════════════════════════════════════════════════

  - id: propstream-replaced-by-byte-slice-reads
    cpp_symbol: "PropStream, PropWriteStream, OTB::MappedFile, OTB::ContentIt, OTB::Identifier, OTB::ChildrenVector"
    cpp_file: "src/fileloader.h"
    rust_symbol: "(direct byte-slice ops in Node.props: Vec<u8>)"
    rust_module: "crates/common/src/fileloader.rs; crates/map/src/items_loader.rs"
    divergence: |
      C++ fileloader.h provides two helper classes:
        - `PropStream` (typed reader over a `const char* / size_t` pair)
        - `PropWriteStream` (typed writer backed by `std::vector<char>`)
      Plus four using-aliases in the OTB namespace:
        - `MappedFile`  (boost::iostreams::mapped_file_source)
        - `ContentIt`   (MappedFile::iterator)
        - `Identifier`  (std::array<char,4> for the 4-byte OTB magic)
        - `ChildrenVector` (std::vector<Node*>)
      In Rust the OTB parser reads the whole file with `std::fs::read()`,
      unescapes the byte stream, and stores decoded props in
      `Node.props: Vec<u8>`.  Callers read typed values directly with
      `u32::from_le_bytes`, `u16::from_le_bytes`, etc., without a dedicated
      wrapper class.  There is no memory-mapped I/O, no PropStream, no
      PropWriteStream.
    reason: |
      Rust's pattern of reading slices and converting with `from_le_bytes`
      is more idiomatic and avoids the coupling between the parser and the
      Boost I/O layer.  The `Vec<u8>` approach also eliminates lifetime
      issues that a pointer-based PropStream would introduce.
    observable_equivalence: |
      test:common::fileloader::tests (crates/common/src/fileloader.rs)
      test:map::items_loader::tests (crates/map/src/items_loader.rs)
      Items loaded from OTB files by the Rust parser carry the same flags,
      speed, weight, and server/client IDs as the C++ loader for the same
      binary file, as verified by `items_otb_loads_ground_item_with_correct_speed_and_weight`.
    verification_state: TESTED
    date: 2026-05-26
    reviewed_by: forgottenserver-rust-final-migration Phase 2
    status: ACCEPTED

  - id: otb-internal-parser-types-removed
    cpp_symbol: "OTB::wildcard, OTB::NodeStack, OTB::getCurrentNode"
    cpp_file: "src/fileloader.cpp"
    rust_symbol: "(internal to common::fileloader::parse)"
    rust_module: "crates/common/src/fileloader.rs"
    divergence: |
      C++ fileloader.cpp uses three internal implementation details:
        - `wildcard` constexpr `Identifier{'\0','\0','\0','\0'}` — the 4-byte
          OTB magic that means "accept any version".
        - `NodeStack` (`std::stack<Node*, std::vector<Node*>>`) — an explicit
          stack used by the iterative C++ OTB parser.
        - `getCurrentNode(NodeStack&)` — a static helper that asserts the
          stack is non-empty and returns the top pointer.
      The Rust parser is recursive-descent: there is no explicit stack and no
      matching helper function.  The wildcard check is inlined as
      `identifier == [0u8; 4]` in the parse entry point.
    reason: |
      Recursive descent eliminates the need for an explicit stack and the
      safety assertions around it, making the parser shorter and easier to
      reason about under Rust's borrow-checker constraints.
    observable_equivalence: |
      test:common::fileloader::tests (crates/common/src/fileloader.rs)
      The parser accepts files with the wildcard identifier and rejects
      files with unknown identifiers, matching C++ runtime behaviour.
    verification_state: TESTED
    date: 2026-05-26
    reviewed_by: forgottenserver-rust-final-migration Phase 2
    status: ACCEPTED

  - id: config-getenv-mysql-deferred-to-db-adapter
    cpp_symbol: "getEnv(const char*, std::string), getEnv(const char*, uint16_t)"
    cpp_file: "src/configmanager.cpp"
    rust_symbol: "(absent — DB env var overrides deferred)"
    rust_module: "crates/common/src/configmanager.rs"
    divergence: |
      C++ ConfigManager::load() calls two file-static `getEnv` overloads to
      allow environment variables (`MYSQL_HOST`, `MYSQL_USER`, `MYSQL_PASSWORD`,
      `MYSQL_DATABASE`, `MYSQL_SOCK`, `MYSQL_PORT`) to override the config-file
      values for database connection strings.  The Rust ConfigManager reads
      from a key=value config file only; no environment-variable override path
      exists yet.  This feature is part of the MariaDB adapter work (a known
      debt item tracked in MIGRATION_LEDGER.yml).
    reason: |
      The MariaDB database adapter is deferred to a later phase.  Adding env
      var support before the adapter exists would produce dead code.  When the
      adapter is wired in, `std::env::var` overrides for the six DB keys should
      be added to `ConfigManager::load`.
    observable_equivalence: |
      test:common::configmanager::tests (crates/common/src/configmanager.rs)
      The absence of env var support is not observable via any existing test
      or protocol path; MySQL connection is established outside the scope of
      the config struct itself.
    verification_state: TESTED
    date: 2026-05-26
    reviewed_by: forgottenserver-rust-final-migration Phase 2
    status: ACCEPTED

  - id: config-lua-stages-replaced-by-programmatic-api
    cpp_symbol: "loadLuaStages(lua_State*)"
    cpp_file: "src/configmanager.cpp"
    rust_symbol: "common::configmanager::ConfigManager::add_experience_stage"
    rust_module: "crates/common/src/configmanager.rs"
    divergence: |
      C++ ConfigManager::load() calls `loadLuaStages(L)` to read experience
      stages from the Lua config table, then falls back to `loadXMLStages()`
      which reads from `data/XML/stages.xml`.  In Rust, experience stages are
      not loaded by the config parser; instead the `add_experience_stage(min,
      max, multiplier)` API is called programmatically by server startup code
      (or a script runner) after the config file is parsed.  There is no Lua
      config reader or XML stages file loader in the Rust codebase.
    reason: |
      Rust's configmanager deliberately uses a plain key=value file rather than
      Lua for config; stages are registered via a typed API rather than being
      embedded in a scripting-language table.  This avoids the Lua state
      dependency in the common crate.
    observable_equivalence: |
      test:common::configmanager::tests::test_get_experience_stage_matching_stage_returns_multiplier
      (crates/common/src/configmanager.rs) confirms the stage-lookup logic
      matches C++ behaviour: the first stage whose [min_level, max_level] band
      covers the query level is returned, with a fallback to RateExperience.
    verification_state: TESTED
    date: 2026-05-26
    reviewed_by: forgottenserver-rust-final-migration Phase 2
    status: ACCEPTED

  - id: outputmessage-add-header-template-removed
    cpp_symbol: "OutputMessage::add_header<T>"
    cpp_file: "src/outputmessage.h"
    rust_symbol: "common::outputmessage::OutputMessage::write_message_length + add_u8/u16/u32"
    rust_module: "crates/common/src/outputmessage.rs"
    divergence: |
      C++ `OutputMessage` provides a `template <typename T> void add_header(T add)`
      that writes a value into the reserved header area before the message body.
      Rust `OutputMessage` does not have a generic `add_header` method; instead,
      `write_message_length()` writes the 2-byte length into position 0 of the
      buffer, and callers use `add_u8`, `add_u16`, `add_u32` for any other
      header bytes.  The XTEA framing layer handles header serialisation through
      direct buffer manipulation rather than through an `OutputMessage` template.
    reason: |
      A generic template for header writes would require unsafe code or
      const-generics to be truly equivalent in Rust.  The protocol header
      (a 2-byte LE length) is fixed-width and written once; a dedicated
      `write_message_length()` method is clearer.  All callers that used
      `add_header` in C++ protocol code are ported to explicit size-typed
      `add_u*` methods.
    observable_equivalence: |
