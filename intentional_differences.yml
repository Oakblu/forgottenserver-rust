# intentional_differences.yml — recorded, justified divergences from C++
#
# Per AI_MIGRATION_CONTEXT.md §3.5:
#   "If Rust intentionally differs from C++, record it in
#   intentional_differences.yml. Include: the C++ symbol, the Rust symbol,
#   the divergence, the reason, and the date.
#   Unrecorded divergence is treated as a bug."
#
# What belongs here:
#   - Divergences that preserve observable behavior at the protocol layer,
#     Lua binding layer, and persisted state layer.
#   - Architectural patterns required by Rust's ownership/safety model that
#     could not be expressed as direct ports.
#   - Code-organization decisions where the C++ file structure does not map
#     cleanly to Rust crates.
#
# What does NOT belong here (per user alignment 2026-05-25 "follow the same
# approach the c++ project is following"):
#   - Backend simplifications (in-memory DB, sync queues, stub Lua dispatch).
#     These are debt to close, not legitimate divergences. They live in
#     MIGRATION_LEDGER.yml as PARTIAL/MISSING gaps.
#   - Cross-crate no-ops where C++ does real work. Same — debt.
#   - "Deferred to higher layer" notes without a real impl. Same — debt.
#
# Schema:
#   - id: <stable kebab-case ID>
#     cpp_symbol: <name or scope>
#     cpp_file: <path or "(workspace-wide)">
#     rust_symbol: <fully-qualified Rust path or pattern>
#     rust_module: <path or "(workspace-wide)">
#     divergence: <one-line summary>
#     reason: <why this is justified — must hold under "observable equivalence">
#     observable_equivalence: <how we verify behavior matches>
#     verification_state: TESTED | HARNESS_PENDING | UNVERIFIED
#     date: YYYY-MM-DD
#     reviewed_by: <source — usually MIGRATION.md log or design doc>
#     status: ACCEPTED | UNDER_REVIEW | REJECTED

version: 1
last_updated: 2026-05-25

# ═════════════════════════════════════════════════════════════════════════
# Workspace-wide architectural patterns
